spring:
  application:
    name: match-service
  datasource:
    url: jdbc:postgresql://${RDS_ENDPOINT}/kickoff?currentSchema=match&TimeZone=UTC
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: match
    show-sql: false
  flyway:
    schemas: match
    default-schema: match
  kafka:
    bootstrap-servers: ${KAFKA_ENDPOINT}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  threads:
    virtual:
      enabled: true

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info

kafka:
  topics:
    match-results: match.results

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

football:
  competition: PL
  season: 2025
  api:
    key: ${FOOTBALL_API_KEY}