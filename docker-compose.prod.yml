services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    restart: unless-stopped

  match-service:
    image: ghcr.io/ykoshovets/kickoff/match-service:latest
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      RDS_ENDPOINT: kickoff-db.c986oye6qibf.eu-central-1.rds.amazonaws.com
      RDS_USERNAME: kickoff
      RDS_PASSWORD: ${RDS_PASSWORD}
      KAFKA_ENDPOINT: kafka:9092
      FOOTBALL_API_KEY: ${FOOTBALL_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JAVA_TOOL_OPTIONS: "-Xmx192m -Xms128m"
    depends_on:
      - kafka
    restart: unless-stopped

  prediction-service:
    image: ghcr.io/ykoshovets/kickoff/prediction-service:latest
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      RDS_ENDPOINT: kickoff-db.c986oye6qibf.eu-central-1.rds.amazonaws.com
