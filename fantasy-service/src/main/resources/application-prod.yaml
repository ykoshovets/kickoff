spring:
  application:
    name: fantasy-service
  datasource:
    url: jdbc:postgresql://${RDS_ENDPOINT}/kickoff?currentSchema=fantasy&TimeZone=UTC
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: fantasy
  flyway:
    schemas: fantasy
    default-schema: fantasy
  kafka:
    bootstrap-servers: ${KAFKA_ENDPOINT}
    consumer:
      group-id: fantasy-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.kickoff.fantasy_service.event.MatchCompletedEvent
  data:
    redis:
      host: ${ELASTICACHE_ENDPOINT}
      port: 6379

server:
  port: 8088

management:
  endpoints:
    web:
      exposure:
        include: health,info

kafka:
  topics:
    match-results: match.results

card-service:
  url: http://card-service:8085

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html