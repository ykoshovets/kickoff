spring:
  application:
    name: trade-service
  datasource:
    url: jdbc:postgresql://localhost:5432/kickoff?currentSchema=trade&TimeZone=UTC
    username: kickoff
    password: kickoff
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: trade
  flyway:
    schemas: trade
    default-schema: trade
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  threads:
    virtual:
      enabled: true

server:
  port: 8087

management:
  endpoints:
    web:
      exposure:
        include: health,info

kafka:
  topics:
    trade-status-changed: trade.status-changed

card-service:
  url: http://localhost:8085

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html