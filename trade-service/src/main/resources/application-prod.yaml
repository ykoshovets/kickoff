spring:
  application:
    name: trade-service
  datasource:
    url: jdbc:postgresql://${RDS_ENDPOINT}/kickoff?currentSchema=trade&TimeZone=UTC
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: trade
  flyway:
    schemas: trade
    default-schema: trade
  kafka:
    bootstrap-servers: ${KAFKA_ENDPOINT}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  threads:
    virtual:
      enabled: true

server:
  port: 8087

management:
  endpoints:
    web:
      exposure:
        include: health,info

kafka:
  topics:
    trade-status-changed: trade.status-changed

card-service:
  url: http://card-service:8085

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html