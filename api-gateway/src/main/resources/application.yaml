spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/users/**

            - id: match-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/matches/**,/api/v1/players/**,/api/v1/games/**

            - id: prediction-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/predictions/**

            - id: coin-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/coins/**

            - id: card-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/v1/cards/**

            - id: pack-service
              uri: http://localhost:8086
              predicates:
                - Path=/api/v1/packs/**

            - id: trade-service
              uri: http://localhost:8087
              predicates:
                - Path=/api/v1/trades/**

            - id: fantasy-service
              uri: http://localhost:8088
              predicates:
                - Path=/api/v1/fantasy/**

            - id: notification-service
              uri: http://localhost:8089
              predicates:
                - Path=/api/v1/notifications/**

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-change-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.cloud.gateway: DEBUG