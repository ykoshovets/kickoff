spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${RDS_ENDPOINT}/kickoff?currentSchema=account&TimeZone=UTC
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
  flyway:
    schemas: account
    default-schema: account
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: account

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-change-in-production}
  expiration: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html