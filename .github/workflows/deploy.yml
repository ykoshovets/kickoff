name: Build and Deploy

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/ykoshovets/kickoff

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - match-service
          - prediction-service
          - coin-service
          - user-service
          - card-service
          - pack-service
          - trade-service
          - fantasy-service
          - notification-service
          - api-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ matrix.service }}-${{ hashFiles(format('{0}/pom.xml', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-maven-${{ matrix.service }}-

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/home/ubuntu/kickoff/"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            /home/ubuntu/kickoff/fetch-secrets.sh
            docker compose -f /home/ubuntu/kickoff/docker-compose.prod.yml pull
            docker compose -f /home/ubuntu/kickoff/docker-compose.prod.yml down
            docker image prune -f

            docker compose -f /home/ubuntu/kickoff/docker-compose.prod.yml up -d kafka
            sleep 30

            docker compose -f /home/ubuntu/kickoff/docker-compose.prod.yml up -d user-service coin-service
            sleep 60

            docker compose -f /home/ubuntu/kickoff/docker-compose.prod.yml up -d match-service api-gateway
            sleep 60

            docker compose -f /home/ubuntu/kickoff/docker-compose.prod.yml up -d card-service pack-service
            sleep 60

            docker compose -f /home/ubuntu/kickoff/docker-compose.prod.yml up -d prediction-service trade-service
            sleep 60

            docker compose -f /home/ubuntu/kickoff/docker-compose.prod.yml up -d fantasy-service notification-service

            echo "All services started"
            docker ps