spring:
  application:
    name: pack-service
  datasource:
    url: jdbc:postgresql://${RDS_ENDPOINT}/kickoff?currentSchema=pack&TimeZone=UTC
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: pack
  flyway:
    schemas: pack
    default-schema: pack
  kafka:
    bootstrap-servers: ${KAFKA_ENDPOINT}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

server:
  port: 8086

management:
  endpoints:
    web:
      exposure:
        include: health,info

kafka:
  topics:
    pack-opened: pack.opened

coin-service:
  url: http://coin-service:8083

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html