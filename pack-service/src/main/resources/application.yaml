spring:
  application:
    name: pack-service
  datasource:
    url: jdbc:postgresql://localhost:5432/kickoff?currentSchema=pack&TimeZone=UTC
    username: kickoff
    password: kickoff
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: pack
  flyway:
    schemas: pack
    default-schema: pack
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  threads:
    virtual:
      enabled: true

server:
  port: 8086

management:
  endpoints:
    web:
      exposure:
        include: health,info

kafka:
  topics:
    pack-opened: pack.opened

coin-service:
  url: http://localhost:8083

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html